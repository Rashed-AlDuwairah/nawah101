name: nawah
description: "نواة — مساحة كتابة آمنة للتعاون بين الكاتب والمحرر"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Typography (Arabic + English fonts)
  google_fonts: ^6.2.1

  # Backend (Supabase)
  supabase_flutter: ^2.9.0

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17

  # Utilities
  uuid: ^4.5.1
  intl: any
  flutter_animate: ^4.5.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
